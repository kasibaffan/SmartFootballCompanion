{% extends "base.html" %}
{% block title %}Log Stats | NEXUS ATHLETE{% endblock %}

{% block content %}
<h1 class="page-title">Weekly Performance</h1>
<p class="page-subtitle">Log this week's match stats to update your dashboard and AI insights.</p>

<div class="card">
  <form method="POST" action="/health">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="grid grid-2">
      <div class="field"><label for="matches">Matches Played</label><input id="matches" type="number" name="matches" required></div>
      <div class="field"><label for="distance">Distance Covered (km)</label><input id="distance" type="number" step="0.1" name="distance" required></div>
      <div class="field"><label for="minutes">Minutes Played</label><input id="minutes" type="number" name="minutes" required></div>
      <div class="field"><label for="challenges">Challenges Taken</label><input id="challenges" type="number" name="challenges" required></div>
      <div class="field"><label for="goals">Goals Scored</label><input id="goals" type="number" name="goals" required></div>
      <div class="field"><label for="assists">Assists</label><input id="assists" type="number" name="assists" required></div>
      <div class="field"><label for="injuries">Injuries</label><input id="injuries" type="number" name="injuries" value="0" required></div>
    </div>
    <button class="btn btn-block" type="submit" style="margin-top:6px;">Save Weekly Stats</button>
  </form>
</div>
{% endblock %}
