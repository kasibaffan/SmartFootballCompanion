<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | SmartFootballCompanion</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    .login-box {
      background: rgba(0, 255, 204, 0.05);
      border-radius: 15px;
      box-shadow: 0 0 25px #00ffcc55;
      width: 380px;
      margin: 100px auto;
      padding: 35px;
      text-align: center;
      animation: slideUp 1.2s ease-out;
      backdrop-filter: blur(10px);
      position: relative;
      overflow: hidden;
    }

    .glow-circle {
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, #00ffcc33, transparent);
      top: -120px;
      left: -100px;
      filter: blur(20px);
      animation: pulse 5s infinite alternate ease-in-out;
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.8; }
      100% { transform: scale(1.2); opacity: 0.4; }
    }

    .login-box h2 {
      background: linear-gradient(90deg, #00ffcc, #0072ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-size: 2em;
      margin-bottom: 25px;
      text-shadow: 0 0 15px #00ffcc66;
    }

    .input-field {
      width: 80%;
      margin: 10px 0;
      padding: 12px;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.7);
      border: none;
      color: #00ffcc;
      font-size: 1em;
      transition: all 0.3s;
    }

    .input-field:focus {
      box-shadow: 0 0 15px #245e2e;
      transform: scale(1.03);
    }

    .btn {
      background: linear-gradient(90deg, #273b37, #0072ff);
      border: none;
      padding: 12px 25px;
      border-radius: 8px;
      color: #000;
      font-weight: 600;
      cursor: pointer;
      margin-top: 20px;
      transition: 0.3s ease;
    }

    .btn:hover {
      background: linear-gradient(90deg, #00ffaa, #3f6ba3);
      transform: scale(1.08);
      box-shadow: 0 0 20px #00ffff88;
    }

    .link {
      margin-top: 15px;
      display: block;
      color: #00ffcc;
      text-decoration: none;
      transition: 0.3s;
    }

    .link:hover {
      color: #fff;
      text-shadow: 0 0 10px #00ffff;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="glow-circle"></div>
    <h2>Player Login ⚽</h2>
    <form method="POST">
      <input class="input-field" type="text" name="username" placeholder="Enter Username" required><br>
      <input class="input-field" type="password" name="password" placeholder="Enter Password" required><br>
      <button class="btn" type="submit">Login</button>
    </form>
    <a href="/register" class="link">Don’t have an account? Create one</a>
  </div>

  <footer>© 2025 SmartFootballCompanion | Built for Passion ⚽💪</footer>
</body>
</html>
