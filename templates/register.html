{% extends "base.html" %}
{% block title %}Register | NEXUS ATHLETE{% endblock %}

{% block content %}
<div class="page-narrow">
  <div class="card" style="text-align:center;">
    <h2 style="margin:0 0 20px;">Create Your Account</h2>
    <form method="POST" style="text-align:left;">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="field">
        <label for="username">Username</label>
        <input id="username" type="text" name="username" required autofocus>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" name="password" required>
      </div>
      <button class="btn btn-block" type="submit">Create Account</button>
    </form>
    <p class="muted" style="margin-top:18px; font-size:0.9rem;">
      Already have an account? <a href="/login" style="color:var(--accent); font-weight:600;">Login</a>
    </p>
  </div>
</div>
{% endblock %}
